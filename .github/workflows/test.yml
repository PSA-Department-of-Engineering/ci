# Reusable test workflow for standard node app repos (ADR-019). A thin per-repo
# caller invokes this with `secrets: inherit`; it type-checks and runs the app's
# unit, e2e, docs, and intent suites. The GitHub Packages token is not named here:
# it lives in the setup-node-auth composite action, which every job uses, so the
# credential has exactly one home. Runs on GitHub-hosted runners so tests never
# depend on homelab uptime; the build (conformance + release) runs on ARC runners.
# Suites are opt-in inputs, defaulting to the standard delivery-app shape.
#
# Scope: standard node app repos (root package.json with test:unit / test:e2e).
# A heterogeneous repo (python backend, frontend in a subdir, non-standard script
# names) keeps its own test.yml and drops the setup-node-auth composite into each
# node job instead - same token home, no reusable-workflow straitjacket.
name: test

on:
  workflow_call:
    inputs:
      node-version:
        description: Node version for the frontend and docs suites.
        type: string
        default: '20'
      unit:
        description: Frontend type-check (tsc --noEmit) + unit tests (npm run test:unit).
        type: boolean
        default: true
      e2e:
        description: Playwright e2e (npm run build, then npm run test:e2e).
        type: boolean
        default: true
      docs:
        description: Docs meta-tests (docs/, npm test).
        type: boolean
        default: true
      intent-audit:
        description: Cross-runtime intent audit over the repo (csd-intent).
        type: boolean
        default: true
    secrets:
      PACKAGES_READ_TOKEN:
        required: false
        description: >-
          A read:packages PAT for a repo OUTSIDE the package's org, whose
          GITHUB_TOKEN cannot read @psa-department-of-engineering/*. Falls back to
          GITHUB_TOKEN inside the composite; a same-org read needs no PAT.

jobs:
  frontend:
    if: ${{ inputs.unit }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PSA-Department-of-Engineering/ci/.github/actions/setup-node-auth@main
        with:
          node-version: ${{ inputs.node-version }}
          packages-read-token: ${{ secrets.PACKAGES_READ_TOKEN }}
      - name: Type-check and unit test
        run: |
          npm ci
          npx tsc --noEmit
          npm run test:unit

  e2e:
    if: ${{ inputs.e2e }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PSA-Department-of-Engineering/ci/.github/actions/setup-node-auth@main
        with:
          node-version: ${{ inputs.node-version }}
          packages-read-token: ${{ secrets.PACKAGES_READ_TOKEN }}
      - name: Build and run e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium
          npm run build
          npm run test:e2e

  docs:
    if: ${{ inputs.docs }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v4
      - uses: PSA-Department-of-Engineering/ci/.github/actions/setup-node-auth@main
        with:
          node-version: ${{ inputs.node-version }}
          packages-read-token: ${{ secrets.PACKAGES_READ_TOKEN }}
      - name: Docs meta-tests
        run: |
          npm ci
          npm test

  intent-audit:
    if: ${{ inputs.intent-audit }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install csd-intent
        run: |
          python -m pip install --upgrade pip
          python -m pip install "csd-intent @ git+https://github.com/PSA-Department-of-Engineering/csd-library.git@csd-intent-v0.3.0#subdirectory=csd-intent"
      - name: Audit intent claims (root + docs, cross-runtime)
        run: csd-intent . --fail-on any
