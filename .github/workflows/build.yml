# Reusable build + release for homelab repos (ADR-019, ADR-024).
#
# A thin per-repo caller invokes this. It runs on the in-cluster ARC dind runners,
# derives a SemVer from Conventional Commits with semantic-release (tag + GitHub
# release), then builds and pushes whatever artifacts the repo ships to GHCR at
# that version: the app image(s) (devops/), the Helm chart (k8s/), and the docs
# site (docs/Dockerfile). Each step is skipped when its input is absent, so the
# platform repo (docs-only) and a full app share one workflow. CI never deploys:
# promotion is ArgoCD Image Updater (ADR-022).
#
# Before any release, a conformance job runs the per-app conformance suite from
# this repo's conformance/ directory (the single home of the chart-side
# INT-HOMELAB claims: devops/, k8s/, docs/ honoring DOCS_BASE, README sections,
# .env.example, intent.yaml, route and identity bindings) and audits the app's
# intent.yaml with csd-intent. It runs in the app's own CI, where the app is
# checked out; the platform repo keeps the install-side suite. release `needs`
# it, so a non-conformant repo is never tagged or published. The docs-only
# platform portal is not an onboardable app and opts out with app-contract: false.
#
# App images come from devops/docker-compose.yml, a repo's single source of truth
# for the images it ships (ADR-018): every service with a build: section is built
# and pushed, named by its compose image:. So a one-image app and a multi-image app
# (e.g. an API plus web frontends) share this workflow with no per-repo edits. A
# repo with no compose falls back to a single devops/Dockerfile named <image-name>.
#
# GHCR repository names must be lowercase; an owner/repo may carry uppercase
# (e.g. PSA-Department-of-Engineering), so every ref is lowercased before use.
name: build

on:
  workflow_call:
    inputs:
      runner:
        description: ARC runner scale set to run on.
        type: string
        default: arc-dind
      image-name:
        description: GHCR base name for the docs image and the single-Dockerfile fallback. Defaults to the repo name.
        type: string
        default: ${{ github.event.repository.name }}
      docs-base:
        description: Base path for the docs site. Empty defaults to /apps/<image-name>; the platform portal passes "/".
        type: string
        default: ''
      app-contract:
        description: >-
          Audit the repo against the REF-Homelab section 4 app contract (and run
          csd-intent on its intent.yaml) before releasing. Onboardable apps leave this
          true; the docs-only platform portal sets it false.
        type: boolean
        default: true
      release-comments:
        description: >-
          When true, semantic-release comments "released in vX.Y.Z" on the issues
          and PRs a release closes. Off by default: the GitHub plugin needs the
          token to carry issues:write and pull-requests:write, so a caller that
          opts in must also grant those permissions, or the release step fails.
        type: boolean
        default: false
    secrets:
      PACKAGES_READ_TOKEN:
        required: false
        description: >-
          A GitHub PAT used for two GitHub Packages operations the per-repo
          GITHUB_TOKEN may not cover: (1) installing @psa-department-of-engineering/*
          npm packages (e.g. vitest-intent) during the docs image build, and (2)
          pushing images to an org GHCR namespace (needs write:packages) when the
          org caps the Actions token to read. Both fall back to GITHUB_TOKEN when
          unset (fine for a same-org npm read and a personal-namespace push).

# No top-level permissions block, deliberately: a called workflow may request
# only a SUBSET of what its caller grants, so declaring permissions here makes
# any caller granting less fail at run creation (startup_failure), and any
# caller granting more (release-comments opt-ins need issues:write +
# pull-requests:write) gets capped to this block. Inheriting means each caller's
# own grant (contents:write + packages:write in the standard thin caller) flows
# through unchanged.

jobs:
  # REF-Homelab section 4: the onboardable-app repo contract. The authoritative
  # per-app suite is conformance/ in THIS repo (pytest + intent markers), run
  # here in each app's own CI, where the app is checked out; the platform repo
  # keeps only the install-side suite (its deploy-* branches), which an app
  # runner cannot read (the platform repo is private and the org token reads
  # packages only). One suite, one home: a hand-mirrored copy of the checks in
  # this workflow is the drift that let 17 claims go unenforced. release `needs`
  # this, so a non-conformant repo is never tagged or published. The docs-only
  # platform portal is not an onboardable app: it passes app-contract: false,
  # which skips every step below. The job still runs and succeeds (no executed
  # step fails), so its release proceeds.
  conformance:
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
    steps:
      - if: ${{ inputs.app-contract }}
        uses: actions/checkout@v4

      - if: ${{ inputs.app-contract }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # csd-intent is the audit CLI (PyYAML installs with it); pytest-intent
      # supplies the @intent decorator the suite imports. Git-tag installs from
      # csd-library — the same pins the platform repo records in its pyproject.toml.
      - if: ${{ inputs.app-contract }}
        name: Install csd-intent, pytest, and the intent runtime
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pyyaml \
            "pytest-intent @ git+https://github.com/PSA-Department-of-Engineering/csd-library.git@pytest-intent-v0.2.0#subdirectory=pytest-intent" \
            "csd-intent @ git+https://github.com/PSA-Department-of-Engineering/csd-library.git@csd-intent-v0.3.0#subdirectory=csd-intent"

      # Audit the app's own intent.yaml BEFORE the suite checkout below lands in
      # the tree: csd-intent scans the whole checkout for markers, and the
      # suite's own INT-HOMELAB markers must not enter this app's audit.
      # CSD-INTENT-01 schema + every active claim attested (default --fail-on any).
      - if: ${{ inputs.app-contract }}
        name: Audit intent.yaml (csd-intent)
        run: csd-intent .

      # The per-app conformance suite, from this repo (the single home of the
      # chart-side INT-HOMELAB claims). Checked out inside the app workspace
      # only after the intent audit above has already read the tree.
      - if: ${{ inputs.app-contract }}
        uses: actions/checkout@v4
        with:
          repository: PSA-Department-of-Engineering/ci
          path: .ci-suite

      - if: ${{ inputs.app-contract }}
        name: Per-app conformance suite (REF-Homelab section 4)
        env:
          CONFORMANCE_APP_DIR: ${{ github.workspace }}
          CONFORMANCE_APP_NAME: ${{ github.event.repository.name }}
        run: pytest .ci-suite/conformance -q

  # The org's two commit invariants (Conventional-Commits subject + no co-author
  # trailer), enforced where every release flows: semantic-release derives the version
  # from the subject type, so a malformed subject silently ships nothing. Unlike
  # conformance this applies to EVERY repo, including the docs-only portal, so it is
  # independent of app-contract. release needs it, so a bad commit is never released.
  commit-hygiene:
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
    steps:
      - uses: PSA-Department-of-Engineering/ci/.github/actions/check-commit-hygiene@main

  # The org's secrets gate: fail the run when a pushed commit introduces a credential.
  # Like commit-hygiene this applies to EVERY repo, including the docs-only portal, so it
  # is independent of app-contract. release needs it, so a leaked secret is never released.
  secrets-scan:
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
    steps:
      - uses: PSA-Department-of-Engineering/ci/.github/actions/secrets-scan@main

  release:
    needs: [conformance, commit-hygiene, secrets-scan]
    runs-on: ${{ inputs.runner }}
    env:
      # ghcr.io/<owner>; lowercased at point of use (owner may carry uppercase).
      REG: ghcr.io/${{ github.repository_owner }}
      APP: ${{ inputs.image-name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: azure/setup-helm@v4

      - name: Log in to GHCR
        # Prefer the PACKAGES_READ_TOKEN PAT (it carries write:packages) when a repo
        # provides one, so it can push to an org GHCR namespace its GITHUB_TOKEN
        # cannot write (orgs cap the Actions token to read). Personal-namespace
        # repos and any repo without the secret fall back to GITHUB_TOKEN.
        run: echo "${{ secrets.PACKAGES_READ_TOKEN || github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      # SemVer from Conventional Commits. No npm publish: just the tag + GitHub release.
      - name: Release config
        env:
          # successComment is opt-in (release-comments) and needs the token to
          # carry issues:write + pull-requests:write, which the caller must grant;
          # otherwise the GitHub plugin throws resolving the issue and fails the
          # release. Off by default keeps every other caller's releases green.
          RELEASE_COMMENTS: ${{ inputs.release-comments }}
        run: |
          if [ "$RELEASE_COMMENTS" = "true" ]; then
            GH_OPTS='{ "failComment": false, "failTitle": false }'
          else
            GH_OPTS='{ "successComment": false, "failComment": false, "failTitle": false }'
          fi
          # commit-analyzer keeps the angular preset's defaults (feat -> minor, fix -> patch,
          # BREAKING -> major); the one added rule pins the org-specific `delivery` type to
          # no release, so the console's deterministic .delivery/ scratch commits never cut a
          # version (check-commit-hygiene lets `delivery(...)` subjects through the gate).
          cat > .releaserc.json <<JSON
          {
            "branches": ["main"],
            "plugins": [
              ["@semantic-release/commit-analyzer", { "releaseRules": [{ "type": "delivery", "release": false }] }],
              "@semantic-release/release-notes-generator",
              ["@semantic-release/github", ${GH_OPTS} ]
            ]
          }
          JSON

      - name: Release
        id: release
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Build and push image(s), chart, docs
        if: steps.release.outputs.new_release_published == 'true'
        env:
          VERSION: ${{ steps.release.outputs.new_release_version }}
          DOCS_BASE: ${{ inputs.docs-base }}
          # Docs sites pull @psa-department-of-engineering/* (e.g. vitest-intent) from
          # GitHub Packages, which needs auth even for public packages. Pass a token to
          # the docs build as a BuildKit secret (below). A same-org repo's GITHUB_TOKEN
          # reads the org's packages; a repo OUTSIDE that org cannot (the token's app
          # installation doesn't exist there), so it supplies a read:packages PAT as
          # PACKAGES_READ_TOKEN, which wins when set.
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_READ_TOKEN || github.token }}
        run: |
          set -euo pipefail
          # cycjimmy/semantic-release-action unconditionally deletes the workspace
          # .npmrc when it finishes (its cleanupNpmrc task, which guards the action's
          # own npm-auth injection). That also removes a repo's COMMITTED root .npmrc
          # and breaks any app image build that COPYs it into the build context (a
          # docs/.npmrc sits outside the action's cwd and is unaffected). Restore
          # deleted/modified tracked files so the build sees the tree as committed.
          git restore .
          REG="$(printf '%s' "$REG" | tr '[:upper:]' '[:lower:]')"
          APP="$(printf '%s' "$APP" | tr '[:upper:]' '[:lower:]')"
          export REG VERSION

          # --- App image(s) ---
          # devops/docker-compose.yml is the single source of truth for the images a
          # repo ships (ADR-018). Build every service that has a build: section and
          # push it as $REG/<compose image:>:$VERSION. The file is parsed, not run, so
          # env_file entries (and a missing .env on a fresh checkout) never matter.
          if [ -f devops/docker-compose.yml ]; then
            npx -y js-yaml@4 devops/docker-compose.yml > /tmp/compose.json
            cat > /tmp/gen-build.js <<'NODE'
          const fs = require('fs'), path = require('path');
          const reg = process.env.REG, version = process.env.VERSION;
          const compose = JSON.parse(fs.readFileSync('/tmp/compose.json', 'utf8'));
          const composeDir = 'devops'; // build.context is relative to the compose file's dir
          const q = s => "'" + String(s).replace(/'/g, "'\\''") + "'";
          const lines = ['set -euo pipefail'];
          let n = 0;
          for (const [name, svc] of Object.entries(compose.services || {})) {
            if (!svc || !svc.build) continue;
            const b = typeof svc.build === 'string' ? { context: svc.build } : svc.build;
            const base = String(svc.image || name).split('/').pop().split(':')[0].toLowerCase();
            const ctx = path.posix.join(composeDir, b.context || '.');
            const dockerfile = path.posix.join(ctx, b.dockerfile || 'Dockerfile');
            const args = Object.entries(b.args || {})
              .map(([k, v]) => '--build-arg ' + q(k + '=' + (v == null ? '' : v)));
            const tag = reg + '/' + base + ':' + version;
            lines.push('echo "==> building ' + base + '"');
            // NODE_AUTH_TOKEN rides in as a BuildKit secret, exactly like the docs
            // build below: app Dockerfiles whose SPA stage consumes
            // @psa-department-of-engineering/* packages mount it; the rest ignore it.
            lines.push(['DOCKER_BUILDKIT=1 docker build', '--secret id=node_auth_token,env=NODE_AUTH_TOKEN', q(ctx), '-f', q(dockerfile), ...args, '-t', q(tag)].join(' '));
            lines.push('docker push ' + q(tag));
            n++;
          }
          if (n === 0) console.error('compose has no buildable services; no app image built');
          fs.writeFileSync('/tmp/build-images.sh', lines.join('\n') + '\n');
          console.error('image builds generated: ' + n);
          NODE
            node /tmp/gen-build.js
            bash /tmp/build-images.sh
          elif [ -f devops/Dockerfile ]; then
            DOCKER_BUILDKIT=1 docker build -f devops/Dockerfile \
              --secret id=node_auth_token,env=NODE_AUTH_TOKEN \
              -t "$REG/$APP:$VERSION" .
            docker push "$REG/$APP:$VERSION"
          fi

          # --- Docs site: base path /apps/<app> by default, "/" for the platform portal. ---
          if [ -f docs/Dockerfile ]; then
            # The docs Projects index is generated from deploy-repos.yaml at build
            # time (ADR-023). That registry lives at the repo root, above the docs/
            # build context, so land a copy inside docs/ for the in-image prebuild
            # (docs/scripts/gen-projects.mjs) to read. Only the platform repo ships
            # this registry; app repos have none and skip it.
            if [ -f deploy-repos.yaml ]; then cp deploy-repos.yaml docs/deploy-repos.yaml; fi
            BASE="${DOCS_BASE:-/apps/$APP}"
            # NODE_AUTH_TOKEN (the workflow token) is passed as a BuildKit secret so
            # docs/Dockerfile's `npm ci` can auth to GitHub Packages without baking the
            # token into a layer. Dockerfiles that don't mount it just ignore it.
            DOCKER_BUILDKIT=1 docker build -f docs/Dockerfile \
              --secret id=node_auth_token,env=NODE_AUTH_TOKEN \
              --build-arg DOCS_BASE="$BASE" -t "$REG/$APP-docs:$VERSION" docs/
            docker push "$REG/$APP-docs:$VERSION"
            docker tag "$REG/$APP-docs:$VERSION" "$REG/$APP-docs:latest"
            docker push "$REG/$APP-docs:latest"
          fi

          # --- Helm chart (chart name comes from k8s/Chart.yaml). ---
          if [ -d k8s ]; then
            helm package k8s --version "$VERSION" --app-version "$VERSION" -d /tmp
            helm push /tmp/*.tgz "oci://$REG/charts"
          fi
