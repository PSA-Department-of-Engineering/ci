# Reusable build + release for homelab repos (ADR-019, ADR-024).
#
# A thin per-repo caller invokes this. It runs on the in-cluster ARC dind runners,
# derives a SemVer from Conventional Commits with semantic-release (tag + GitHub
# release), then builds and pushes whatever artifacts the repo ships to GHCR at
# that version: the app image(s) (devops/), the Helm chart (k8s/), and the docs
# site (docs/Dockerfile). Each step is skipped when its input is absent, so the
# platform repo (docs-only) and a full app share one workflow. CI never deploys:
# promotion is ArgoCD Image Updater (ADR-022).
#
# Before any release, a conformance job audits the repo against the REF-Homelab
# section 4 app contract (devops/, k8s/, docs/ that honors DOCS_BASE, README sections,
# .env.example, intent.yaml) and runs csd-intent on its intent.yaml. This is where the
# platform's per-app repo-contract tests run — in the app's own CI, where its files are
# checked out — since a platform CI runner has no sibling app clones. release `needs`
# it, so a non-conformant repo is never tagged or published. The docs-only platform
# portal is not an onboardable app and opts out with app-contract: false.
#
# App images come from devops/docker-compose.yml, a repo's single source of truth
# for the images it ships (ADR-018): every service with a build: section is built
# and pushed, named by its compose image:. So a one-image app and a multi-image app
# (e.g. an API plus web frontends) share this workflow with no per-repo edits. A
# repo with no compose falls back to a single devops/Dockerfile named <image-name>.
#
# GHCR repository names must be lowercase; an owner/repo may carry uppercase
# (e.g. PSA-Department-of-Engineering), so every ref is lowercased before use.
name: build

on:
  workflow_call:
    inputs:
      runner:
        description: ARC runner scale set to run on.
        type: string
        default: arc-dind
      image-name:
        description: GHCR base name for the docs image and the single-Dockerfile fallback. Defaults to the repo name.
        type: string
        default: ${{ github.event.repository.name }}
      docs-base:
        description: Base path for the docs site. Empty defaults to /apps/<image-name>; the platform portal passes "/".
        type: string
        default: ''
      app-contract:
        description: >-
          Audit the repo against the REF-Homelab section 4 app contract (and run
          csd-intent on its intent.yaml) before releasing. Onboardable apps leave this
          true; the docs-only platform portal sets it false.
        type: boolean
        default: true
      release-comments:
        description: >-
          When true, semantic-release comments "released in vX.Y.Z" on the issues
          and PRs a release closes. Off by default: the GitHub plugin needs the
          token to carry issues:write and pull-requests:write, so a caller that
          opts in must also grant those permissions, or the release step fails.
        type: boolean
        default: false
    secrets:
      PACKAGES_READ_TOKEN:
        required: false
        description: >-
          A GitHub PAT used for two GitHub Packages operations the per-repo
          GITHUB_TOKEN may not cover: (1) installing @psa-department-of-engineering/*
          npm packages (e.g. vitest-intent) during the docs image build, and (2)
          pushing images to an org GHCR namespace (needs write:packages) when the
          org caps the Actions token to read. Both fall back to GITHUB_TOKEN when
          unset (fine for a same-org npm read and a personal-namespace push).

# No top-level permissions block, deliberately: a called workflow may request
# only a SUBSET of what its caller grants, so declaring permissions here makes
# any caller granting less fail at run creation (startup_failure), and any
# caller granting more (release-comments opt-ins need issues:write +
# pull-requests:write) gets capped to this block. Inheriting means each caller's
# own grant (contents:write + packages:write in the standard thin caller) flows
# through unchanged.

jobs:
  # REF-Homelab section 4: the onboardable-app repo contract. The platform's own
  # tests/test_repo_conformance.py checks this (INT-HOMELAB-002..009, 018) against
  # sibling clones and pytest.skips when they are absent — a platform CI runner has
  # none, so the authoritative gate lives HERE, in each app's own CI, where its files
  # are actually checked out. release `needs` this, so a non-conformant repo is never
  # tagged or published. The docs-only platform portal is not an onboardable app: it
  # passes app-contract: false, which skips every step below. The job still runs and
  # succeeds (no executed step fails), so its release proceeds.
  conformance:
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
    steps:
      - if: ${{ inputs.app-contract }}
        uses: actions/checkout@v4

      - if: ${{ inputs.app-contract }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # csd-intent is the audit CLI (PyYAML installs with it). Git-tag install from
      # csd-library — the same pin the platform repo records in its pyproject.toml.
      - if: ${{ inputs.app-contract }}
        name: Install csd-intent
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "csd-intent @ git+https://github.com/PSA-Department-of-Engineering/csd-library.git@csd-intent-v0.3.0#subdirectory=csd-intent"

      # Mirror tests/test_repo_conformance.py: report every violation, then fail once,
      # so a maintainer sees the whole gap in one run instead of one error at a time.
      - if: ${{ inputs.app-contract }}
        name: Audit repo against the REF-Homelab section 4 contract
        run: |
          set -uo pipefail
          fail=0
          bad() { echo "  x $1"; fail=1; }
          echo "REF-Homelab section 4 app-repo contract:"

          # devops/: one Dockerfile, a compose that builds FROM it, and no image-push
          # script (publishing is CI's job, never a local script).
          [ -f devops/Dockerfile ] || bad "missing devops/Dockerfile (INT-HOMELAB-002)"
          if [ -f devops/docker-compose.yml ]; then
            grep -q 'devops/Dockerfile' devops/docker-compose.yml \
              || bad "devops/docker-compose.yml must build FROM devops/Dockerfile (INT-HOMELAB-003)"
          else
            bad "missing devops/docker-compose.yml (INT-HOMELAB-003)"
          fi
          if [ -d devops ]; then
            push=$(find devops -maxdepth 1 -type f 2>/dev/null | grep -i push | grep -i image || true)
            [ -z "$push" ] || bad "image-push script in devops/ (CI publishes; the repo only builds): ${push//$'\n'/ }(INT-HOMELAB-004)"
          fi

          # k8s/: a Helm chart, not loose manifests.
          for f in Chart.yaml templates values.yaml; do
            [ -e "k8s/$f" ] || bad "k8s/ is not a complete Helm chart, missing k8s/$f (INT-HOMELAB-005)"
          done

          # Homepage tile discovery: the app's tile hangs off its <app>-docs docs HTTPRoute, and
          # Homepage derives the tile's pod-status selector from that route NAME (it looks for a pod
          # labelled app.kubernetes.io/name=<app>-docs). So the docs Deployment must label its pod
          # app.kubernetes.io/name: <chart>-docs inline (the fleet convention), or the tile reads
          # NOT FOUND though the docs are healthy. Files with a Deployment only, so the docs Service
          # is not scanned; same docs heuristic INT-HOMELAB-030 uses to except the docs workload.
          if [ -d k8s/templates ]; then
            while IFS= read -r f; do
              [ -n "$f" ] || continue
              grep -qE 'app\.kubernetes\.io/component:[[:space:]]*docs|-docs' "$f" || continue
              grep -qE 'app\.kubernetes\.io/name:.*-docs' "$f" \
                || bad "docs Deployment $f labels its pod with the bare app name; the app's <app>-docs homepage tile can't find the pod and reads NOT FOUND. Label it app.kubernetes.io/name: <chart>-docs inline, not via the shared labels/selectorLabels helper (INT-HOMELAB-048)"
            done < <(grep -rlE 'kind:[[:space:]]*Deployment' k8s/templates 2>/dev/null)
          fi

          # --- chart delivery-wiring guards (INT-HOMELAB-045..047): three defect classes
          # autonomous deliveries shipped and only live traffic caught (ImagePullBackOff, an
          # NXDOMAIN host, a self-upgrading sidecar). Grep mirrors of the same-named
          # tests/test_repo_conformance.py checks, run HERE so the release fails before the app
          # is ever deployed, instead of the delivery stopping degraded at live verification.

          # 045: every Deployment template references imagePullSecrets, or its pods pull
          # anonymously from private GHCR and land in ImagePullBackOff (token-racing-track,
          # shattered-catacombs) — invisible until the app is live. Per-file, like the docs-label
          # check above.
          if [ -d k8s/templates ]; then
            while IFS= read -r f; do
              [ -n "$f" ] || continue
              grep -q 'imagePullSecrets' "$f" \
                || bad "Deployment template $f references no imagePullSecrets; its pods pull anonymously and ImagePullBackOff on private GHCR. Reference the values-driven list (default: [name: ghcr-pull]) (INT-HOMELAB-045)"
            done < <(grep -rlE 'kind:[[:space:]]*Deployment' k8s/templates 2>/dev/null)
          fi

          # 046: an app HTTPRoute must attach to the app's own platform Gateway (parentRef
          # pinning namespace network, never an invented gateway) AND carry the app hostname,
          # or external-dns (gateway-httproute source) registers nothing and the host stays
          # NXDOMAIN. Both shapes shipped live (token-racing-track: a hallucinated
          # homelab-gateway/gateway-system parent with no hostnames; shattered-catacombs: the
          # namespace line dropped). The namespace check is values-driven-or-literal like the
          # test, case-insensitive on the values side so a flat `gatewayNamespace: network` reads
          # the same as a nested `gateway.namespace`.
          if [ -d k8s/templates ]; then
            routes=$(grep -rlE 'kind:[[:space:]]*HTTPRoute' k8s/templates 2>/dev/null || true)
            if [ -n "$routes" ]; then
              for inv in homelab-gateway gateway-system; do
                grep -qsF "$inv" $routes \
                  && bad "HTTPRoute references '$inv', which is not a platform Gateway; the app route attaches to the app's own Gateway (name = the app, namespace = network) (INT-HOMELAB-046)"
              done
              grep -qs 'hostnames:' $routes \
                || bad "no HTTPRoute template carries hostnames:; external-dns registers DNS from the route hostname, so the app host stays NXDOMAIN (INT-HOMELAB-046)"
              { [ -f k8s/values.yaml ] && grep -qiE '^[[:space:]]*[a-z0-9_-]*host[a-z0-9_-]*:[[:space:]]*"?[^[:space:]"]*\.chaos-architect\.dev' k8s/values.yaml; } \
                || bad "k8s/values.yaml sets no <name>.chaos-architect.dev hostname default for the route to carry, so external-dns registers nothing (INT-HOMELAB-046)"
              { grep -qsE 'namespace:[[:space:]]*network\b' $routes \
                || { [ -f k8s/values.yaml ] && grep -qsiE 'namespace:[[:space:]]*network\b' k8s/values.yaml; }; } \
                || bad "the app route's parentRef pins no 'network' namespace (values-driven gateway namespace or literal); without it the ref defaults to the app namespace, no Gateway accepts the route, and DNS never registers (INT-HOMELAB-046)"
            fi
          fi

          # 047: no FULL third-party image ref (one carrying a registry/path, unlike the
          # first-party repository+tag split the deploy branch pins and Image Updater maintains)
          # may float on :latest — it self-upgrades on the registry's schedule and cannot be
          # rolled back (an oauth2-proxy; token-racing-track shipped one). Full refs ending
          # :latest, in values.yaml or literal in a template ({{ }}-templated refs are skipped by
          # excluding '{'), are the offenders; a bare `tag: latest` has no '/' and is inert.
          latest=""
          if [ -f k8s/values.yaml ]; then
            hits=$(grep -oE '[^[:space:]"]+/[^[:space:]"]+:latest' k8s/values.yaml || true)
            [ -z "$hits" ] || latest="$latest values.yaml:{${hits//$'\n'/ }}"
          fi
          if [ -d k8s/templates ]; then
            hits=$(grep -rhoE 'image:[[:space:]]*"?[^[:space:]"{]+/[^[:space:]"{]+:latest' k8s/templates 2>/dev/null || true)
            [ -z "$hits" ] || latest="$latest templates:{${hits//$'\n'/ }}"
          fi
          [ -z "$latest" ] || bad "third-party image reference(s) floating on :latest (self-upgrading, un-rollbackable; pin a version):$latest (INT-HOMELAB-047)"

          # docs/: a deployable site that honors DOCS_BASE so it mounts under the portal
          # prefix. astro `base` derives from DOCS_BASE, and the Dockerfile declares ARG
          # DOCS_BASE and serves the built (flat) site UNDER that prefix.
          if [ -d docs ]; then
            [ -f docs/Dockerfile ] || bad "docs/ has no Dockerfile (INT-HOMELAB-006)"
            cfg=$(ls docs/astro.config.* 2>/dev/null | head -1 || true)
            if [ -n "$cfg" ]; then
              { grep -q 'DOCS_BASE' "$cfg" && grep -Eq 'base[[:space:]]*:' "$cfg"; } \
                || bad "docs/astro.config.* must derive Astro base from DOCS_BASE (INT-HOMELAB-018)"
            else
              bad "docs/ has no astro.config.* (not a Starlight/Astro site) (INT-HOMELAB-006)"
            fi
            if [ -f docs/Dockerfile ]; then
              grep -q 'ARG DOCS_BASE' docs/Dockerfile \
                || bad "docs/Dockerfile must declare ARG DOCS_BASE (INT-HOMELAB-018)"
              grep -Eq 'html/?\$\{?DOCS_BASE\}?' docs/Dockerfile \
                || bad "docs/Dockerfile must serve the built site under DOCS_BASE (INT-HOMELAB-018)"
            fi
          else
            bad "missing docs/ (INT-HOMELAB-006)"
          fi

          # README contract sections (case-insensitive substring, matching the test).
          if [ -f README.md ]; then
            for s in "run with docker" "develop without docker" "layout"; do
              grep -qi "$s" README.md || bad "README.md missing required section: '$s' (INT-HOMELAB-007)"
            done
          else
            bad "missing README.md (INT-HOMELAB-007)"
          fi

          # Config contract and the CSD entry point.
          [ -f .env.example ] || bad "missing .env.example (INT-HOMELAB-008)"
          [ -f intent.yaml ] || bad "missing root intent.yaml (INT-HOMELAB-009)"

          # .github/workflows/: an app never provides the GitHub Packages token itself. The
          # token lives once, in the shared setup-node-auth composite; an app calls it (or
          # thin-calls the reusable test.yml) and never assigns NODE_AUTH_TOKEN. One
          # invariant, not a blocklist of spellings (mirrors tests/test_repo_conformance.py).
          if [ -d .github/workflows ]; then
            tok=$(grep -rlE 'NODE_AUTH_TOKEN[[:space:]]*[:=]' .github/workflows 2>/dev/null || true)
            [ -z "$tok" ] || bad "workflow(s) set NODE_AUTH_TOKEN themselves (call the shared setup-node-auth composite instead): ${tok//$'\n'/ }(INT-HOMELAB-039)"
          fi

          if [ "$fail" -ne 0 ]; then
            echo "Repo violates the REF-Homelab section 4 contract (see the lines above)."
            exit 1
          fi
          echo "  OK: section 4 contract satisfied"

      # Audit the app's own intent.yaml: CSD-INTENT-01 schema + every active claim
      # attested by a test marker somewhere in the repo (default --fail-on any).
      - if: ${{ inputs.app-contract }}
        name: Audit intent.yaml (csd-intent)
        run: csd-intent .

  # The org's two commit invariants (Conventional-Commits subject + no co-author
  # trailer), enforced where every release flows: semantic-release derives the version
  # from the subject type, so a malformed subject silently ships nothing. Unlike
  # conformance this applies to EVERY repo, including the docs-only portal, so it is
  # independent of app-contract. release needs it, so a bad commit is never released.
  commit-hygiene:
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
    steps:
      - uses: PSA-Department-of-Engineering/ci/.github/actions/check-commit-hygiene@main

  # The org's secrets gate: fail the run when a pushed commit introduces a credential.
  # Like commit-hygiene this applies to EVERY repo, including the docs-only portal, so it
  # is independent of app-contract. release needs it, so a leaked secret is never released.
  secrets-scan:
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
    steps:
      - uses: PSA-Department-of-Engineering/ci/.github/actions/secrets-scan@main

  release:
    needs: [conformance, commit-hygiene, secrets-scan]
    runs-on: ${{ inputs.runner }}
    env:
      # ghcr.io/<owner>; lowercased at point of use (owner may carry uppercase).
      REG: ghcr.io/${{ github.repository_owner }}
      APP: ${{ inputs.image-name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: azure/setup-helm@v4

      - name: Log in to GHCR
        # Prefer the PACKAGES_READ_TOKEN PAT (it carries write:packages) when a repo
        # provides one, so it can push to an org GHCR namespace its GITHUB_TOKEN
        # cannot write (orgs cap the Actions token to read). Personal-namespace
        # repos and any repo without the secret fall back to GITHUB_TOKEN.
        run: echo "${{ secrets.PACKAGES_READ_TOKEN || github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      # SemVer from Conventional Commits. No npm publish: just the tag + GitHub release.
      - name: Release config
        env:
          # successComment is opt-in (release-comments) and needs the token to
          # carry issues:write + pull-requests:write, which the caller must grant;
          # otherwise the GitHub plugin throws resolving the issue and fails the
          # release. Off by default keeps every other caller's releases green.
          RELEASE_COMMENTS: ${{ inputs.release-comments }}
        run: |
          if [ "$RELEASE_COMMENTS" = "true" ]; then
            GH_OPTS='{ "failComment": false, "failTitle": false }'
          else
            GH_OPTS='{ "successComment": false, "failComment": false, "failTitle": false }'
          fi
          # commit-analyzer keeps the angular preset's defaults (feat -> minor, fix -> patch,
          # BREAKING -> major); the one added rule pins the org-specific `delivery` type to
          # no release, so the console's deterministic .delivery/ scratch commits never cut a
          # version (check-commit-hygiene lets `delivery(...)` subjects through the gate).
          cat > .releaserc.json <<JSON
          {
            "branches": ["main"],
            "plugins": [
              ["@semantic-release/commit-analyzer", { "releaseRules": [{ "type": "delivery", "release": false }] }],
              "@semantic-release/release-notes-generator",
              ["@semantic-release/github", ${GH_OPTS} ]
            ]
          }
          JSON

      - name: Release
        id: release
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Build and push image(s), chart, docs
        if: steps.release.outputs.new_release_published == 'true'
        env:
          VERSION: ${{ steps.release.outputs.new_release_version }}
          DOCS_BASE: ${{ inputs.docs-base }}
          # Docs sites pull @psa-department-of-engineering/* (e.g. vitest-intent) from
          # GitHub Packages, which needs auth even for public packages. Pass a token to
          # the docs build as a BuildKit secret (below). A same-org repo's GITHUB_TOKEN
          # reads the org's packages; a repo OUTSIDE that org cannot (the token's app
          # installation doesn't exist there), so it supplies a read:packages PAT as
          # PACKAGES_READ_TOKEN, which wins when set.
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_READ_TOKEN || github.token }}
        run: |
          set -euo pipefail
          # cycjimmy/semantic-release-action unconditionally deletes the workspace
          # .npmrc when it finishes (its cleanupNpmrc task, which guards the action's
          # own npm-auth injection). That also removes a repo's COMMITTED root .npmrc
          # and breaks any app image build that COPYs it into the build context (a
          # docs/.npmrc sits outside the action's cwd and is unaffected). Restore
          # deleted/modified tracked files so the build sees the tree as committed.
          git restore .
          REG="$(printf '%s' "$REG" | tr '[:upper:]' '[:lower:]')"
          APP="$(printf '%s' "$APP" | tr '[:upper:]' '[:lower:]')"
          export REG VERSION

          # --- App image(s) ---
          # devops/docker-compose.yml is the single source of truth for the images a
          # repo ships (ADR-018). Build every service that has a build: section and
          # push it as $REG/<compose image:>:$VERSION. The file is parsed, not run, so
          # env_file entries (and a missing .env on a fresh checkout) never matter.
          if [ -f devops/docker-compose.yml ]; then
            npx -y js-yaml@4 devops/docker-compose.yml > /tmp/compose.json
            cat > /tmp/gen-build.js <<'NODE'
          const fs = require('fs'), path = require('path');
          const reg = process.env.REG, version = process.env.VERSION;
          const compose = JSON.parse(fs.readFileSync('/tmp/compose.json', 'utf8'));
          const composeDir = 'devops'; // build.context is relative to the compose file's dir
          const q = s => "'" + String(s).replace(/'/g, "'\\''") + "'";
          const lines = ['set -euo pipefail'];
          let n = 0;
          for (const [name, svc] of Object.entries(compose.services || {})) {
            if (!svc || !svc.build) continue;
            const b = typeof svc.build === 'string' ? { context: svc.build } : svc.build;
            const base = String(svc.image || name).split('/').pop().split(':')[0].toLowerCase();
            const ctx = path.posix.join(composeDir, b.context || '.');
            const dockerfile = path.posix.join(ctx, b.dockerfile || 'Dockerfile');
            const args = Object.entries(b.args || {})
              .map(([k, v]) => '--build-arg ' + q(k + '=' + (v == null ? '' : v)));
            const tag = reg + '/' + base + ':' + version;
            lines.push('echo "==> building ' + base + '"');
            // NODE_AUTH_TOKEN rides in as a BuildKit secret, exactly like the docs
            // build below: app Dockerfiles whose SPA stage consumes
            // @psa-department-of-engineering/* packages mount it; the rest ignore it.
            lines.push(['DOCKER_BUILDKIT=1 docker build', '--secret id=node_auth_token,env=NODE_AUTH_TOKEN', q(ctx), '-f', q(dockerfile), ...args, '-t', q(tag)].join(' '));
            lines.push('docker push ' + q(tag));
            n++;
          }
          if (n === 0) console.error('compose has no buildable services; no app image built');
          fs.writeFileSync('/tmp/build-images.sh', lines.join('\n') + '\n');
          console.error('image builds generated: ' + n);
          NODE
            node /tmp/gen-build.js
            bash /tmp/build-images.sh
          elif [ -f devops/Dockerfile ]; then
            DOCKER_BUILDKIT=1 docker build -f devops/Dockerfile \
              --secret id=node_auth_token,env=NODE_AUTH_TOKEN \
              -t "$REG/$APP:$VERSION" .
            docker push "$REG/$APP:$VERSION"
          fi

          # --- Docs site: base path /apps/<app> by default, "/" for the platform portal. ---
          if [ -f docs/Dockerfile ]; then
            # The docs Projects index is generated from deploy-repos.yaml at build
            # time (ADR-023). That registry lives at the repo root, above the docs/
            # build context, so land a copy inside docs/ for the in-image prebuild
            # (docs/scripts/gen-projects.mjs) to read. Only the platform repo ships
            # this registry; app repos have none and skip it.
            if [ -f deploy-repos.yaml ]; then cp deploy-repos.yaml docs/deploy-repos.yaml; fi
            BASE="${DOCS_BASE:-/apps/$APP}"
            # NODE_AUTH_TOKEN (the workflow token) is passed as a BuildKit secret so
            # docs/Dockerfile's `npm ci` can auth to GitHub Packages without baking the
            # token into a layer. Dockerfiles that don't mount it just ignore it.
            DOCKER_BUILDKIT=1 docker build -f docs/Dockerfile \
              --secret id=node_auth_token,env=NODE_AUTH_TOKEN \
              --build-arg DOCS_BASE="$BASE" -t "$REG/$APP-docs:$VERSION" docs/
            docker push "$REG/$APP-docs:$VERSION"
            docker tag "$REG/$APP-docs:$VERSION" "$REG/$APP-docs:latest"
            docker push "$REG/$APP-docs:latest"
          fi

          # --- Helm chart (chart name comes from k8s/Chart.yaml). ---
          if [ -d k8s ]; then
            helm package k8s --version "$VERSION" --app-version "$VERSION" -d /tmp
            helm push /tmp/*.tgz "oci://$REG/charts"
          fi
